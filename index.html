<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <meta name="description" content="Workspace profissional para criação, validação e exportação local de perfis de carga.">
  <title>Charge Profile Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js" defer></script>
  <script type="module" src="app.js"></script>
</head>
<body>
  <div class="ambient-grid" aria-hidden="true"></div>

  <div class="page-shell">
    <header class="topbar">
      <div class="topbar__left">
        <div class="brand-lockup" aria-label="Charge Profile Studio">
          <span class="brand-mark"><img src="VISUAL/OpenBlast/LOGO OPENBLAST TRANSPARENTE.png" alt="OpenBlast"></span>
          <span class="brand-text">
            <strong>Charge Profile Studio</strong>
          </span>
        </div>
        <div class="topbar__polygon">
          <input id="polygonNameTop" type="text" aria-label="Identificação da malha">
        </div>
        <div class="topbar__template">
          <select id="templateNameTop" aria-label="Modelo"></select>
        </div>
        <div class="segmented-control" aria-label="Quantidade de perfis">
          <button type="button" id="profileMinus" aria-label="Remover perfil">-</button>
          <span id="profileCountLabel">2 perfis</span>
          <button type="button" id="profilePlus" aria-label="Adicionar perfil">+</button>
        </div>
        <div class="topbar__language">
          <select id="languageSelect" aria-label="Idioma"></select>
        </div>
      </div>
      <div class="topbar__right">
        <div class="download-group" aria-label="Formatos de exportação">
          <button class="ghost-button" type="button" data-download="svg">SVG</button>
          <button class="ghost-button" type="button" data-download="png">PNG</button>
          <button class="ghost-button" type="button" data-download="jpg">JPG</button>
          <button class="ghost-button accent-button" type="button" data-download="pdf">PDF</button>
        </div>
        <div class="topbar__actions">
          <button class="ghost-button" type="button" id="saveButton">Salvar</button>
          <button class="ghost-button" type="button" id="resetButton">Restaurar</button>
        </div>
      </div>
    </header>

    <main class="workspace">
      <aside class="sidebar" id="sidebar">
        <div class="profile-tabs" id="profileTabs"></div>
        <div class="sidebar__body" id="sidebarBody">
          <div id="segmentEditorArea"></div>
          <div id="autoCalcSummary"></div>
          <div class="sidebar__collapsible">
            <button class="sidebar__collapsible-toggle" type="button" id="toggleGlobalSection" aria-expanded="false">
              <span>Configuração &amp; Rótulos</span>
              <span class="chevron" aria-hidden="true"></span>
            </button>
            <div class="sidebar__collapsible-body" id="globalSettingsArea" hidden></div>
          </div>
        </div>
      </aside>

      <section class="canvas-area">
        <div class="preview-canvas" id="previewCanvas" aria-live="polite"></div>
        <div class="validation" id="validation"></div>
      </section>
    </main>
  </div>

  <noscript>
    <div class="noscript">Esta interface precisa de JavaScript para funcionar.</div>
  </noscript>
</body>
</html>
